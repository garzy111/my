<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel=" stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <title>My APP</title>
    </head>

<body>
    <div class="profile-container">
        <div class="profile-header">
        <img src="logo.jpeg" class="profile-img">

        <div class="profile-info">
            <h2>Mr. Dkay</h2>
           <section class="p"><p class="P">apartment b12</p></section>
          <section class="follows">
           <span class="following">Freinds</span>
          </section>
        </div>

        <button class="edit">Edit</button>

        </div >
    </div>
        
    <div class="profile-tag">
       <div class="properties"><h3>Properties</h3></div>
       <div class="investment"><h3>Investment</h3></div>
       <a href="#"><div class="roi"><h3>ROI</h3></div></a>
    </div>

    <div class="profile-page">
        <button class="home-button">Home</button>
        <button class="pages-button">Posts</button>
    </div>

    <div class="profile-settings">
        <section class="kyc">
            <h4>KYC Verification</h4>
            <strong><h2>></h2></strong>
        </section>
        <section class="mydao">
            <h4>My DAO</h4>
        </section>

            <h4>Settings</h4>
        </section>
        <section class="support">
            <h4>Support</h4>
        </section>
    </div>

    <section class="log-out"><h4>Log Out</h4></section>

 <nav class="bottom">
        <button onclick="gohome()"><i class="fas fa-home"></i></button>
        <button onclick="gochat()"><i class="fas fa-comment"></i></button>
        <button onclick="gopost()"><i class="fas fa-add"></i></button>
        <button onclick="gowallet()"><i class="fas fa-wallet"></i></button>
        <button onclick="goprofile()"><i class="fas fa-user"></i></button>
 </nav>    
<script src="app.js"></script>
</body>

</html>
